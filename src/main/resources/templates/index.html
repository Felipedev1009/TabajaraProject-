<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizações Tabajara</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        /* SCROLLBAR INVISÍVEL */
        *::-webkit-scrollbar { width: 0px; background: transparent; }
        *::-webkit-scrollbar-track { background: transparent; }
        *::-webkit-scrollbar-thumb { background: transparent; }
        * { -ms-overflow-style: none !important; scrollbar-width: none !important; }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: 
                linear-gradient(145deg, #0f0f23 0%, #1a1a2e 40%, #16213e 100%),
                radial-gradient(circle at 20% 20%, rgba(137, 180, 250, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(116, 199, 236, 0.1) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Partículas flutuantes sutis */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(4px 4px at 30% 20%, rgba(139, 92, 246, 0.3), transparent),
                radial-gradient(3px 3px at 70% 60%, rgba(6, 182, 212, 0.2), transparent),
                radial-gradient(2px 2px at 40% 80%, rgba(16, 185, 129, 0.25), transparent);
            background-repeat: no-repeat;
            background-size: 100% 100%;
            animation: particlesFloat 25s ease-in-out infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes particlesFloat {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.6; }
            33% { transform: translate(20px, -15px) scale(1.1); opacity: 0.8; }
            66% { transform: translate(-10px, 10px) scale(0.95); opacity: 0.4; }
        }

        .dashboard {
            background: rgba(15, 15, 35, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 24px;
            padding: 60px 50px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 
                0 40px 80px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(139, 92, 246, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            animation: dashboardRise 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
            transform: translateY(60px) scale(0.9);
        }

        @keyframes dashboardRise {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .dashboard::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #8b5cf6, #06b6d4, #10b981, #f59e0b, #8b5cf6);
            background-size: 300% 100%;
            animation: rainbowShift 3s ease infinite;
            border-radius: 24px 24px 0 0;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }

        @keyframes rainbowShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .logo {
            font-size: 4.5rem;
            background: linear-gradient(135deg, #ffffff 0%, #8b5cf6 50%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            font-weight: 900;
            animation: logoPulse 2s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(139, 92, 246, 0.5);
        }

        @keyframes logoPulse {
            0%, 100% { 
                filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.4));
                transform: scale(1);
            }
            50% { 
                filter: drop-shadow(0 0 40px rgba(139, 92, 246, 0.8));
                transform: scale(1.05);
            }
        }

        h1 {
            background: linear-gradient(135deg, #e2e8f0 0%, #ffffff 50%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -0.02em;
            animation: titleGlitch 4s ease-in-out infinite;
        }

        @keyframes titleGlitch {
            0%, 95%, 100% { transform: translateX(0); }
            10% { transform: translateX(-2px); }
            20% { transform: translateX(2px); }
            30%, 40% { transform: translateX(-1px); }
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.3rem;
            font-weight: 400;
            margin-bottom: 50px;
            animation: subtitleFade 2s ease forwards;
            opacity: 0;
        }

        @keyframes subtitleFade {
            to { opacity: 1; }
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 400px;
            margin: 0 auto;
        }

        .menu-item {
            position: relative;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 22px 30px;
            background: rgba(30, 30, 58, 0.6);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            text-decoration: none;
            color: #e2e8f0;
            font-weight: 600;
            font-size: 1.2rem;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
            animation: menuSlide 0.8s ease forwards;
            opacity: 0;
            transform: translateY(40px);
            will-change: transform, box-shadow;
        }

        .menu-item:nth-child(1) { animation-delay: 0.8s; }
        .menu-item:nth-child(2) { animation-delay: 1.1s; }

        @keyframes menuSlide {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .menu-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.2), transparent);
            transition: left 0.6s;
        }

        .menu-item:hover::before {
            left: 100%;
        }

        .menu-item:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #8b5cf6;
            box-shadow: 
                0 25px 50px rgba(139, 92, 246, 0.4),
                0 0 0 4px rgba(139, 92, 246, 0.2);
            background: rgba(30, 30, 58, 0.9);
        }

        .menu-icon {
            font-size: 1.5rem;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #8b5cf6, #06b6d4);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
            transition: all 0.3s ease;
        }

        .menu-item:hover .menu-icon {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 12px 35px rgba(139, 92, 246, 0.6);
        }

        .status-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #64748b;
            font-size: 0.9rem;
            animation: statusFade 3s ease forwards;
            opacity: 0;
        }

        @keyframes statusFade {
            to { opacity: 1; }
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .dashboard {
                padding: 40px 25px;
                border-radius: 20px;
                margin: 10px;
            }
            .logo { font-size: 3.5rem; }
            h1 { font-size: 2.2rem; }
            .menu-item {
                padding: 18px 24px;
                font-size: 1.1rem;
                gap: 16px;
            }
            .menu-icon {
                width: 45px;
                height: 45px;
                font-size: 1.3rem;
            }
        }

        /* Performance */
        .menu-item, .logo, h1 {
            will-change: transform;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="logo">🚀</div>
        <h1>Organizações Tabajara</h1>
        <p class="subtitle">Sistema de Gerenciamento Premium</p>
        
        <nav class="menu">
            <a href="#" class="menu-item" th:href="@{/produtos/listar}">
                <div class="menu-icon">📦</div>
                <span>Gerenciar Produtos</span>
            </a>
            <a href="#" class="menu-item" th:href="@{/fornecedores/listar}">
                <div class="menu-icon">🏭</div>
                <span>Gerenciar Fornecedores</span>
            </a>
        </nav>

        <div class="status-bar">
            ✨ Desenvolvido pela Tabajara Tech ✨
        </div>
    </div>
</body>
</html>
