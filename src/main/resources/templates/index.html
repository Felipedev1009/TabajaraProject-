<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizações Tabajara</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        *::-webkit-scrollbar { width: 0; background: transparent; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --glass-bg: rgba(30,30,58,0.6);
            --glass-border: rgba(139,92,246,0.2);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --purple: #8b5cf6;
            --cyan: #06b6d4;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, var(--bg-primary) 0%, var(--bg-secondary) 40%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-primary);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(4px 4px at 30% 20%, rgba(139,92,246,0.3), transparent),
                radial-gradient(3px 3px at 70% 60%, rgba(6,182,212,0.2), transparent);
            animation: float 25s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes float {
            0%,100% { transform: translate(0,0); }
            50% { transform: translate(20px,-20px); }
        }

        .container-box {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 2px solid var(--glass-border);
            border-radius: 28px;
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            animation: rise 1s ease forwards;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg,#fff,var(--purple),var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin-bottom: 1rem;
        }

        a {
            display: block;
            text-decoration: none;
            padding: 14px;
            border-radius: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg,var(--purple),var(--cyan));
            transition: all 0.3s ease;
        }

        a:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 15px 30px rgba(139,92,246,0.4);
        }

    </style>
</head>
<body>

<div class="container-box">
    <h1>Bem-vindo(a) as Organizações Tabajara</h1>
    <p>Utilize os links para acessar o Sistema ou se Registrar</p>

    <ul>
        <li><a th:href="@{/login}">Acesse o Sistema</a></li>
        <li><a th:href="@{/usuarios/criar}">Registrar o novo Usuario</a></li>
    </ul>
</div>

</body>
</html>
