<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        *::-webkit-scrollbar { width: 0; background: transparent; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --glass-bg: rgba(30,30,58,0.6);
            --glass-border: rgba(139,92,246,0.2);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --purple: #8b5cf6;
            --cyan: #06b6d4;
            --error: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, var(--bg-primary) 0%, var(--bg-secondary) 40%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-primary);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(4px 4px at 30% 20%, rgba(139,92,246,0.3), transparent),
                radial-gradient(3px 3px at 70% 60%, rgba(6,182,212,0.2), transparent);
            animation: float 25s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes float {
            0%,100% { transform: translate(0,0); }
            50% { transform: translate(20px,-20px); }
        }

        .login-box {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 2px solid var(--glass-border);
            border-radius: 28px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            animation: rise 1s ease forwards;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            font-size: 2.4rem;
            font-weight: 800;
            margin-bottom: 2rem;
            background: linear-gradient(135deg,#fff,var(--purple),var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        form div {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(15,15,35,0.7);
            color: var(--text-primary);
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 2px rgba(139,92,246,0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg,var(--purple),var(--cyan));
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(139,92,246,0.4);
        }

        p {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.95rem;
        }


        .back-btn {
            margin-top: 1.5rem;
        }

    </style>
</head>
<body>

<div class="login-box">
    <h1>Login</h1>
    <p th:if="${param.registered}" style="color: #10b981; text-align: center; margin-bottom: 1rem;">Cadastro realizado com sucesso. Faça login.</p>
    <p th:if="${param.resetSucesso}" style="color: #10b981; text-align: center; margin-bottom: 1rem;">Senha redefinida com sucesso. Faça login.</p>

    <form th:action="@{/login}" method="post">
        <div>
            <label for="username">Login:</label>
            <input type="text" id="username" name="username" required>
        </div>

        <div>
            <label for="password">senha:</label>
            <input type="password" id="password" name="password" required>
        </div>

        <button type="submit">Entrar</button>
    </form>
    
    <a href="/esqueci-senha">Esqueci minha senha</a>

    <p th:if="${param.error}">Credenciais invalidas tente novamente</p>
    <p th:if="${param.logout}">logout efetuado</p>

    <form action="/tabajara" method="get" class="back-btn">
        <button type="submit">Voltar para a Home</button>
    </form>
</div>

</body>
</html>
