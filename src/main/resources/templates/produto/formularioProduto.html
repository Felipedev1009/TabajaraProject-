<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Produto</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        /* SCROLLBAR INVISÍVEL */
        *::-webkit-scrollbar { width: 0px; background: transparent; }
        *::-webkit-scrollbar-track { background: transparent; }
        *::-webkit-scrollbar-thumb { background: transparent; }
        * { -ms-overflow-style: none !important; scrollbar-width: none !important; }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            overflow-y: scroll;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            padding: 20px 20px 120px 20px;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            will-change: auto;
        }

        /* Fundo otimizado */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 25% 25%, rgba(137, 180, 250, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(116, 199, 236, 0.15) 0%, transparent 50%);
            animation: bgFloat 30s ease-in-out infinite;
            z-index: -1;
            opacity: 0.5;
            pointer-events: none;
        }

        @keyframes bgFloat {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.05) translateY(-10px); }
        }

        .container {
            background: rgba(15, 15, 35, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            padding: 50px 40px 70px 40px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(139, 92, 246, 0.15);
            max-width: 500px;
            width: 100%;
            position: relative;
            margin: 0 auto;
            animation: containerRise 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
            will-change: transform;
        }

        @keyframes containerRise {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #8b5cf6, #06b6d4, #10b981);
            background-size: 200% 100%;
            animation: gradientShift 4s ease infinite;
            border-radius: 20px 20px 0 0;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        h1 {
            text-align: center;
            background: linear-gradient(135deg, #ffffff 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 40px;
            position: relative;
            animation: titleGlow 3s ease-in-out infinite alternate;
            will-change: filter;
        }

        @keyframes titleGlow {
            from { filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.3)); }
            to { filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.6)); }
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        label {
            font-weight: 600;
            color: #e2e8f0;
            font-size: 1rem;
            margin-bottom: 10px;
            display: block;
            position: relative;
            animation: labelSlide 0.8s ease forwards;
            opacity: 0;
            transform: translateX(-30px);
        }

        @keyframes labelSlide {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* INPUTS TEXT */
        input[type="text"] {
            padding: 18px 24px;
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            background: rgba(30, 30, 58, 0.8);
            color: #ffffff;
            transition: all 0.3s ease;
            backdrop-filter: blur(15px);
            animation: inputRise 0.8s ease forwards;
            opacity: 0;
            transform: translateY(20px);
            will-change: transform, border-color;
        }

        /* SELECT ESTILIZADO */
        select {
            padding: 18px 24px;
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            background: rgba(30, 30, 58, 0.8);
            color: #ffffff;
            transition: all 0.3s ease;
            backdrop-filter: blur(15px);
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%238b5cf6' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 16px center;
            background-repeat: no-repeat;
            background-size: 18px;
            animation: inputRise 0.8s ease forwards;
            opacity: 0;
            transform: translateY(20px);
            will-change: transform, border-color;
            min-height: 60px;
        }

        select:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.2);
            transform: translateY(-3px);
            background: rgba(30, 30, 58, 0.95);
        }

        select:hover {
            border-color: rgba(139, 92, 246, 0.6);
            transform: translateY(-2px);
        }

        select option {
            background: #1e1b4b;
            color: #ffffff;
            padding: 12px;
        }

        select option:checked {
            background: #8b5cf6;
            color: white;
        }

        input[type="text"]:focus, input[type="hidden"]:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.2);
            transform: translateY(-3px);
            background: rgba(30, 30, 58, 0.95);
        }

        input[type="text"]:hover {
            border-color: rgba(139, 92, 246, 0.6);
            transform: translateY(-2px);
        }

        input[type="text"]::placeholder {
            color: rgba(148, 163, 184, 0.6);
        }

        input[type="hidden"] {
            display: none;
        }

        /* BOTÃO SALVAR - SEMPRE VISÍVEL */
        input[type="submit"] {
            background: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%) !important;
            color: white !important;
            border: none !important;
            padding: 20px 28px !important;
            font-size: 1.15rem !important;
            font-weight: 700 !important;
            border-radius: 20px !important;
            cursor: pointer !important;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
            position: relative !important;
            overflow: hidden !important;
            text-transform: uppercase !important;
            letter-spacing: 1px !important;
            margin-top: 15px !important;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4) !important;
            opacity: 1 !important;
            transform: scale(1) !important;
            display: block !important;
            width: 100% !important;
            font-family: 'Inter', sans-serif !important;
            animation: buttonPulse 2s ease-in-out infinite !important;
            will-change: transform, box-shadow;
        }

        @keyframes buttonPulse {
            0%, 100% { box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4); }
            50% { box-shadow: 0 15px 40px rgba(139, 92, 246, 0.6); }
        }

        input[type="submit"]:hover {
            transform: translateY(-5px) scale(1.02) !important;
            box-shadow: 0 20px 50px rgba(139, 92, 246, 0.5) !important;
        }

        input[type="submit"]:active {
            transform: translateY(-2px) scale(0.98) !important;
        }

        /* ANIMAÇÕES SEQUENCIAIS */
        label:nth-of-type(1) { animation-delay: 0.4s; }
        input:nth-of-type(1), select:nth-of-type(1) { animation-delay: 0.6s; }
        label:nth-of-type(2) { animation-delay: 0.8s; }
        input:nth-of-type(2) { animation-delay: 1s; }
        label:nth-of-type(3)  { animation-delay: 1.2s; }
        input:nth-of-type(3)  { animation-delay: 1.4s; }
        label:nth-of-type(4)  { animation-delay: 1.6s; }
        input:nth-of-type(4)  { animation-delay: 1.8s; }
        label:nth-of-type(5)  { animation-delay: 2s; }
        select:nth-of-type(1) { animation-delay: 2s; }
        

        @keyframes inputRise {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { 
                padding: 35px 25px 50px 25px; 
                border-radius: 16px;
                margin: 10px auto;
            }
            h1 { font-size: 2rem; }
            input[type="submit"], select { 
                padding: 18px 20px !important;
                font-size: 1.05rem !important;
            }
        }

        br { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cadastrar Produto</h1>
        <form th:action="@{/produtos/salvar}" method="POST" th:object="${produto}">
 
            <input type="hidden" name="idProduto" th:field="*{idProduto}" />
 
            <label for="descricaoProduto">Descrição:</label>
            <input type="text" name="descricaoProduto" th:field="*{descricaoProduto}" placeholder="Nome do produto" />
            
            <label for="valorProduto">Valor:</label>
            <input type="text" name="valorProduto" th:field="*{valorProduto}" placeholder="R$ 0,00" />
 
            <label for="unidadeProduto">Unidade:</label>
            <input type="text" name="unidadeProduto" th:field="*{unidadeProduto}" placeholder="UN, KG, LT, etc" />
 
            <label for="marcaProduto">Marca:</label>
            <input type="text" name="marcaProduto" th:field="*{marcaProduto}" placeholder="Nome da marca" />
 
            <label for="fornecedor">Fornecedor:</label>
            <select th:field="*{fornecedor.idFornecedor}">
                <option th:each="fornecedor : ${fornecedores}"
                        th:text="${fornecedor.nomeFornecedor}"
                        th:value="${fornecedor.idFornecedor}">
                </option>
            </select>
 
            <input type="submit" value="Salvar Produto 🚀">
 
        </form>
    </div>
</body>
</html>
