<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Usuario</title>
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        /* SCROLLBAR INVISÍVEL */
        *::-webkit-scrollbar { width: 0px; background: transparent; }
        *::-webkit-scrollbar-track { background: transparent; }
        *::-webkit-scrollbar-thumb { background: transparent; }
        * { -ms-overflow-style: none !important; scrollbar-width: none !important; }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            overflow-y: scroll;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            padding: 20px 20px 120px 20px;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            will-change: auto;
        }

        /* Fundo otimizado */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 25% 25%, rgba(137, 180, 250, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(116, 199, 236, 0.15) 0%, transparent 50%);
            animation: bgFloat 30s ease-in-out infinite;
            z-index: -1;
            opacity: 0.5;
            pointer-events: none;
        }

        @keyframes bgFloat {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.05) translateY(-10px); }
        }

        .container {
            background: rgba(15, 15, 35, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            padding: 50px 40px 70px 40px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(139, 92, 246, 0.15);
            max-width: 500px;
            width: 100%;
            position: relative;
            margin: 0 auto;
            animation: containerRise 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
            will-change: transform;
        }

        @keyframes containerRise {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #8b5cf6, #06b6d4, #10b981);
            background-size: 200% 100%;
            animation: gradientShift 4s ease infinite;
            border-radius: 20px 20px 0 0;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .form-title {
            text-align: center;
            background: linear-gradient(135deg, #ffffff 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 40px;
            position: relative;
            animation: titleGlow 3s ease-in-out infinite alternate;
            will-change: filter;
        }

        @keyframes titleGlow {
            from { filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.3)); }
            to { filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.6)); }
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .field-group {
            animation: fieldSlide 0.8s ease forwards;
            opacity: 0;
            transform: translateX(-30px);
        }

        @keyframes fieldSlide {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form-label {
            font-weight: 600;
            color: #e2e8f0;
            font-size: 1rem;
            margin-bottom: 10px;
            display: block;
            position: relative;
        }

        .required::after {
            content: '*';
            color: #ef4444;
            margin-left: 4px;
        }

        .form-control {
            padding: 18px 24px;
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            background: rgba(30, 30, 58, 0.8);
            color: #ffffff;
            transition: all 0.3s ease;
            backdrop-filter: blur(15px);
            animation: inputRise 0.8s ease forwards;
            opacity: 0;
            transform: translateY(20px);
            will-change: transform, border-color;
            width: 100%;
        }

        .form-control:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.2);
            transform: translateY(-3px);
            background: rgba(30, 30, 58, 0.95);
        }

        .form-control:hover {
            border-color: rgba(139, 92, 246, 0.6);
            transform: translateY(-2px);
        }

        .form-control::placeholder {
            color: rgba(148, 163, 184, 0.6);
        }

        .form-text {
            color: rgba(148, 163, 184, 0.8);
            font-size: 0.875rem;
            margin-top: 5px;
            font-style: italic;
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .col-md-6 {
            flex: 1;
        }

        @keyframes inputRise {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* BOTÃO SUBMIT */
        .btn-submit {
            background: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%) !important;
            color: white !important;
            border: none !important;
            padding: 20px 28px !important;
            font-size: 1.15rem !important;
            font-weight: 700 !important;
            border-radius: 20px !important;
            cursor: pointer !important;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
            position: relative !important;
            overflow: hidden !important;
            text-transform: uppercase !important;
            letter-spacing: 1px !important;
            margin-top: 15px !important;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4) !important;
            opacity: 1 !important;
            transform: scale(1) !important;
            display: block !important;
            width: 100% !important;
            font-family: 'Inter', sans-serif !important;
            animation: buttonPulse 2s ease-in-out infinite !important;
            will-change: transform, box-shadow;
        }

        @keyframes buttonPulse {
            0%, 100% { box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4); }
            50% { box-shadow: 0 15px 40px rgba(139, 92, 246, 0.6); }
        }

        .btn-submit:hover {
            transform: translateY(-5px) scale(1.02) !important;
            box-shadow: 0 20px 50px rgba(139, 92, 246, 0.5) !important;
        }

        .btn-submit:active {
            transform: translateY(-2px) scale(0.98) !important;
        }

        /* LINK VOLTAR */
        .btn-back {
            color: #8b5cf6;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            color: #c084fc;
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
            transform: translateX(-5px);
        }

        /* DICA FINAL */
        .text-white small {
            color: rgba(226, 232, 240, 0.8) !important;
        }

        /* ANIMAÇÕES SEQUENCIAIS */
        .field-group:nth-of-type(1) { animation-delay: 0.4s; }
        .field-group:nth-of-type(1) .form-control { animation-delay: 0.6s; }
        .field-group:nth-of-type(2) { animation-delay: 0.8s; }
        .field-group:nth-of-type(2) .form-control { animation-delay: 1s; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { 
                padding: 35px 25px 50px 25px; 
                border-radius: 16px;
                margin: 10px auto;
            }
            .form-title { font-size: 2rem; }
            .btn-submit, .form-control { 
                padding: 18px 20px !important;
                font-size: 1.05rem !important;
            }
            .row {
                flex-direction: column;
                gap: 0;
            }
        }

        br { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <!-- Card do formulário -->
            <h1 class="form-title">
                <i class="bi bi-person"></i>
                <span th:if="${usuario.idUsuario == null}">Cadastrar Usuario</span>
                <span th:if="${usuario.idUsuario != null}">Editar Usuario</span>
            </h1>
            
            <!-- Formulário -->
            <form th:action="@{/usuarios/salvar}" method="POST" th:object="${usuario}">
                <input type="hidden" th:field="*{idUsuario}" />
                
                <!-- Campo Nome -->
                <div class="field-group">
                    <label for="nomeUsuario" class="form-label">
                        <i class="bi bi-pencil"></i>
                        <span class="required">Nome Usuario</span>
                    </label>
                    <input type="text" 
                           class="form-control" 
                           id="nomeUsuario" 
                           th:field="*{nomeUsuario}"
                           placeholder="Digite Seu nome"
                           required>
                    <div class="form-text">Ex: Pedrão</div>
                </div>

                <!-- Campo Email -->
                <div class="field-group">
                    <label for="emailUsuario" class="form-label">
                        <i class="bi bi-envelope"></i>
                        <span class="required">Email</span>
                    </label>
                    <input type="email" 
                           class="form-control" 
                           id="emailUsuario" 
                           th:field="*{emailUsuario}"
                           placeholder="Digite Seu email"
                           required>
                    <div class="form-text">Ex: junimmatador@gmail.com.br</div>
                </div>

                <!-- Botões de ação -->
                <div class="d-flex justify-content-between align-items-center mt-4">
                    <button type="submit" class="btn-submit">
                        <i class="bi bi-check-lg"></i>
                        <span th:if="${usuario.idUsuario == null}">Cadastrar Usuario</span>
                        <span th:if="${usuario.idUsuario != null}">Atualizar Usuario</span>
                    </button>
                </div>
            </form>

            <!-- Link de voltar -->
            <div class="text-center mt-4">
                <a th:href="@{/home}" class="btn-back">
                    <i class="bi bi-arrow-left"></i>
                    Voltar para pagina inicial
                </a>
            </div>
        </div>

        <!-- Dica rápida (opcional) -->
        <div class="text-center mt-3 text-white">
            <small>
                <i class="bi bi-info-circle me-1"></i>
                Preencha todos os campos obrigatórios para cadastrar o Usuario
            </small>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
