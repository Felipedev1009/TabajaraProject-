<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Criar Usuário - Organizações Tabajara</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* SCROLLBAR INVISÍVEL */
        *::-webkit-scrollbar { width: 0; background: transparent; }
        *::-webkit-scrollbar-track, *::-webkit-scrollbar-thumb { background: transparent; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        /* BASE & VARIÁVEIS */
        :root {
            --glass-bg: rgba(15,15,35,0.98);
            --glass-border: rgba(139,92,246,0.2);
            --input-bg: rgba(30,30,58,0.8);
            --input-bg-focus: rgba(40,40,75,0.95);
            --text-placeholder: rgba(148,163,184,0.6);
            --text-input: #f8fafc;
            --purple-glow: #8b5cf6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            padding: 20px 20px 120px;
            overflow-x: hidden;
        }

        /* FUNDO ANIMADO SUAVE */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(137,180,250,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(116,199,236,0.12) 0%, transparent 50%);
            animation: bgFloat 35s ease-in-out infinite;
            z-index: -1;
            pointer-events: none;
        }
        @keyframes bgFloat {
            0%,100% { transform: scale(1) translateY(0); opacity: 0.6; }
            50% { transform: scale(1.03) translateY(-8px); opacity: 0.8; }
        }

        /* CONTAINER PRINCIPAL */
        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 60px 45px 80px;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.35),
                0 0 0 1px rgba(139,92,246,0.15),
                inset 0 1px 0 rgba(255,255,255,0.05);
            max-width: 520px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            animation: containerRise 1.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
            opacity: 0;
            transform: translateY(50px);
        }
        @keyframes containerRise {
            to { opacity: 1; transform: translateY(0); }
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--purple-glow), #06b6d4, #10b981, var(--purple-glow));
            background-size: 300% 100%;
            animation: gradientShift 3s ease-in-out infinite;
            border-radius: 24px 24px 0 0;
            box-shadow: 0 0 15px rgba(139,92,246,0.4);
        }
        @keyframes gradientShift {
            0%,100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* TÍTULO PREMIUM */
        .form-title {
            text-align: center;
            background: linear-gradient(135deg, #ffffff 0%, var(--purple-glow) 50%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: clamp(2.2rem, 5vw, 2.8rem);
            font-weight: 800;
            margin-bottom: 45px;
            letter-spacing: -0.02em;
            position: relative;
            animation: titleGlow 3.5s ease-in-out infinite alternate;
            text-shadow: 0 0 25px rgba(139,92,246,0.3);
        }
        @keyframes titleGlow {
            0% { filter: drop-shadow(0 0 12px rgba(139,92,246,0.3)); }
            100% { filter: drop-shadow(0 0 25px rgba(139,92,246,0.6)); }
        }

        /* FORMULÁRIO */
        form { display: flex; flex-direction: column; gap: 32px; }
        .field-group {
            animation: fieldSlide 0.9s cubic-bezier(0.34,1.56,0.64,1) forwards;
            opacity: 0;
            transform: translateX(-35px);
        }
        @keyframes fieldSlide {
            to { opacity: 1; transform: translateX(0); }
        }
        .field-group:nth-of-type(1) { animation-delay: 0.5s; }
        .field-group:nth-of-type(2) { animation-delay: 0.7s; }
        .field-group:nth-of-type(3) { animation-delay: 0.9s; }
        .field-group:nth-of-type(4) { animation-delay: 1.1s; }

        .form-label {
            font-weight: 600;
            color: #e2e8f0;
            font-size: 1.05rem;
            margin-bottom: 12px;
            display: block;
            letter-spacing: 0.3px;
        }
        .form-label.required::after {
            content: '*';
            color: #ef4444;
            margin-left: 6px;
            font-size: 1.1em;
        }

        /* INPUTS - PLACEHOLDER ESCURO, TEXTO DIGITADO BRANCO */
        .form-control {
            padding: 20px 28px;
            border: 2px solid rgba(139,92,246,0.25);
            border-radius: 20px;
            font-size: 1.12rem;
            font-weight: 500;
            background: var(--input-bg);
            color: transparent; /* Placeholder visível */
            transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
            backdrop-filter: blur(18px);
            width: 100%;
            animation: inputRise 0.9s cubic-bezier(0.34,1.56,0.64,1) forwards;
            opacity: 0;
            transform: translateY(25px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            caret-color: var(--purple-glow);
        }
        
        /* TEXTO DIGITADO SEMPRE BRANCO */
        .form-control:not(:placeholder-shown),
        .form-control:focus {
            color: var(--text-input) !important;
            -webkit-text-fill-color: var(--text-input) !important;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--purple-glow);
            box-shadow: 
                0 0 0 4px rgba(139,92,246,0.15),
                0 15px 35px rgba(139,92,246,0.2);
            background: var(--input-bg-focus);
            transform: translateY(-4px);
        }
        .form-control:hover:not(:focus) {
            border-color: rgba(139,92,246,0.5);
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.25);
        }
        
        /* PLACEHOLDER ESCURO COMO ANTES */
        .form-control::placeholder { 
            color: var(--text-placeholder) !important;
            opacity: 1 !important;
            font-weight: 400;
        }
        
        /* AUTOFILL CORRIGIDO */
        .form-control:-webkit-autofill,
        .form-control:-webkit-autofill:hover,
        .form-control:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 30px var(--input-bg-focus) inset !important;
            -webkit-text-fill-color: var(--text-input) !important;
            color: var(--text-input) !important;
            transition: background-color 5000s ease-in-out 0s;
            background-color: var(--input-bg-focus) !important;
            border-color: var(--purple-glow);
        }

        @keyframes inputRise {
            to { opacity: 1; transform: translateY(0); }
        }

        .form-text {
            color: rgba(148,163,184,0.75);
            font-size: 0.92rem;
            margin-top: 8px;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* BOTÕES PREMIUM */
        .btn-submit, .btn-back {
            font-family: 'Inter', sans-serif !important;
            font-weight: 700 !important;
            border-radius: 20px !important;
            border: none !important;
            cursor: pointer !important;
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 10px !important;
            text-decoration: none !important;
            position: relative !important;
            overflow: hidden !important;
            letter-spacing: 0.5px !important;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--purple-glow) 0%, #06b6d4 50%, #10b981 100%) !important;
            color: white !important;
            padding: 22px 32px !important;
            font-size: 1.18rem !important;
            text-transform: uppercase !important;
            box-shadow: 0 12px 35px rgba(139,92,246,0.4) !important;
            animation: buttonPulse 2.5s ease-in-out infinite !important;
            width: 100% !important;
            margin-top: 8px !important;
        }
        @keyframes buttonPulse {
            0%,100% { box-shadow: 0 12px 35px rgba(139,92,246,0.4); transform: scale(1); }
            50% { box-shadow: 0 18px 45px rgba(139,92,246,0.55); transform: scale(1.02); }
        }
        .btn-submit:hover {
            transform: translateY(-6px) scale(1.03) !important;
            box-shadow: 0 25px 55px rgba(139,92,246,0.5) !important;
        }

        .btn-back {
            color: var(--purple-glow) !important;
            background: rgba(139,92,246,0.08) !important;
            border: 2px solid rgba(139,92,246,0.25) !important;
            padding: 16px 28px !important;
            font-size: 1rem !important;
            margin-top: 20px !important;
            width: 100% !important;
            backdrop-filter: blur(15px);
        }
        .btn-back:hover {
            color: #ffffff !important;
            background: rgba(139,92,246,0.15) !important;
            border-color: var(--purple-glow) !important;
            transform: translateY(-3px) !important;
            box-shadow: 0 15px 35px rgba(139,92,246,0.3) !important;
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            body { padding: 12px; }
            .container { padding: 40px 28px 60px; border-radius: 20px; margin: 8px auto; }
            .form-title { font-size: 2.1rem; margin-bottom: 35px; }
            .form-control { padding: 18px 24px; font-size: 1.08rem; }
            .btn-submit { padding: 20px 28px !important; font-size: 1.12rem !important; }
        }
        @media (max-width: 480px) { .container { padding: 35px 24px 50px; } }
    </style>
</head>
<body>

<div class="container">
    <h1 class="form-title">
        <i class="bi bi-person-plus-fill"></i>
        Criar Usuário
    </h1>

    <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post">
        <div class="field-group">
            <label for="nomeUsuario" class="form-label required">Nome Completo</label>
            <input type="text" 
                   th:field="*{nomeUsuario}" 
                   class="form-control" 
                   id="nomeUsuario" 
                   placeholder="Digite o nome completo"
                   required>
        </div>

        <div class="field-group">
            <label for="emailUsuario" class="form-label required">Email</label>
            <input type="email" 
                   th:field="*{emailUsuario}" 
                   class="form-control" 
                   id="emailUsuario" 
                   placeholder="exemplo@empresa.com"
                   required>
        </div>

        <div class="field-group">
            <label for="loginUsuario" class="form-label required">Login</label>
            <input type="text" 
                   th:field="*{loginUsuario}" 
                   class="form-control" 
                   id="loginUsuario" 
                   placeholder="Digite o login do usuário"
                   required>
        </div>

        <div class="field-group">
            <label for="senhaUsuario" class="form-label required">Senha</label>
            <input type="password" 
                   th:field="*{senhaUsuario}" 
                   class="form-control" 
                   id="senhaUsuario" 
                   placeholder="Senha segura (mín. 8 caracteres)"
                   required minlength="8">
            <small class="form-text">Use pelo menos 8 caracteres com letras, números e símbolos</small>
        </div>

        <button type="submit" class="btn btn-primary btn-submit">
            <i class="bi bi-check-lg"></i>
            Criar Usuário
        </button>

        <a th:href="@{/tabajara}" class="btn btn-secondary btn-back">
            <i class="bi bi-arrow-left"></i>
            Voltar
        </a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
