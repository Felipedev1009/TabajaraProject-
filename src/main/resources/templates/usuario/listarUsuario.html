<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Usuários</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            padding: 30px 20px 50px;
            color: #e2e8f0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(15, 15, 35, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        h2 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #ffffff, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-add {
            display: inline-block;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-add:hover {
            transform: translateY(-2px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(25, 25, 55, 0.8);
            border-radius: 16px;
            overflow: hidden;
        }

        th {
            background: linear-gradient(135deg, #1e293b, #334155);
            padding: 15px;
            text-align: left;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(55, 65, 81, 0.5);
        }

        tr:hover td {
            background: rgba(139, 92, 246, 0.1);
        }

        .btn-edit {
            background: #3b82f6;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            margin-right: 5px;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Lista de Usuários</h2>

    <a th:href="@{/usuarios/criar}" class="btn-add">
        ➕ Novo Usuário
    </a>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Email</th>
                <th>Login</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="u : ${usuarios}">
                <td th:text="${u.idUsuario}"></td>
                <td th:text="${u.nomeUsuario}"></td>
                <td th:text="${u.emailUsuario}"></td>
                <td th:text="${u.loginUsuario}"></td>
                <td>
                    <a th:href="@{/usuarios/editar/{id}(id=${u.idUsuario})}" class="btn-edit">
                        Editar
                    </a>
                    <a th:href="@{/usuarios/excluir/{id}(id=${u.idUsuario})}" class="btn-delete">
                        Excluir
                    </a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
